# Monorepo : sans ce fichier, Railway lance Railpack sur la racine → npm run build → Next (next: not found).
# On force l’image FastAPI définie dans backend/Dockerfile.
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.railway"

# Pas de healthcheck HTTP : l’image Playwright + imports FastAPI peuvent dépasser le délai par défaut
# et laisser le déploiement bloqué sur « service unavailable » alors que l’app finit par démarrer.
