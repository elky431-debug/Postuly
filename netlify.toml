# Next.js dans frontend/ : obligatoire pour que Netlify détecte le framework (pas « 0 frameworks »).
# Ne pas utiliser publish = dist ni /* → index.html : ce n’est pas une SPA Vite, l’App Router + API casseraient.
[build]
  base = "frontend"
  # Install reproductible puis build (évite des écarts lockfile / node_modules sur Netlify).
  command = "npm ci && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20.9.0"

[[plugins]]
  package = "@netlify/plugin-nextjs"
